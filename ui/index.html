<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SteamLinkOS UI</title>
    <link rel="stylesheet" href="./steamos-like.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">SteamLinkOS</div>
        <nav>
          <button class="nav-item active">Início</button>
          <button class="nav-item">Biblioteca</button>
          <button class="nav-item">Conexão</button>
          <button class="nav-item">Configurações</button>
          <button class="nav-item">Energia</button>
        </nav>
      </aside>

      <main class="content">
        <header class="topbar">
          <div class="title">Tela inicial</div>
          <div class="status">Online • 5 GHz • 1080p</div>
        </header>

        <section class="hero-card">
          <p class="eyebrow">Jogar remotamente</p>
          <h1>Conecte-se ao seu PC Steam</h1>
          <p class="desc">Experiência otimizada para controle, TV e baixa latência.</p>
          <div class="actions">
            <button class="btn primary">Iniciar Steam Link</button>
            <button class="btn secondary">Parear novo dispositivo</button>
          </div>
        </section>

        <section class="tiles">
          <article class="tile">
            <h3>Latência</h3>
            <p>8 ms</p>
          </article>
          <article class="tile">
            <h3>Codec</h3>
            <p>H.265</p>
          </article>
          <article class="tile">
            <h3>Áudio</h3>
            <p>HDMI 5.1</p>
          </article>
          <article class="tile">
            <h3>Controle</h3>
            <p>Xbox Wireless</p>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
